name: Publish to PyPI

# Publishes the package to PyPI via OIDC "trusted publishing" — no API token
# or password is stored in the repo. The PyPI project "zotery" is configured to
# trust this repository + this workflow file (publish.yml).
#
# Releases are cut by creating a GitHub Release whose tag matches the version
# in pyproject.toml (e.g. tag v0.1.0 for version = "0.1.0").

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # id-token: write is REQUIRED for trusted publishing (OIDC). It is scoped to
    # this job only so the build job above cannot mint PyPI credentials.
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
